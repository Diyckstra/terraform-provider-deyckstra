name: Run linters for the documentation

on:
  pull_request_target:
    branches: 'develop'
    paths: 'docs/**'

jobs:
  doc-linter:
    runs-on: ubuntu-22.04
    steps:
    - name: Setup Go
      uses: actions/setup-go@v2
      with:
        go-version: 1.21.x

    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.head.sha }}

    - name: Install tools
      run: make tools

    - name: Install Docker
      uses: docker/setup-docker-action@v4

    - name: Run linters for the documentation
      run: make docs-lint
