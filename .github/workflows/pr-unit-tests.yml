name: Run unit tests for the code

on:
  pull_request_target:
    branches: 'develop'
    types: 
      - labeled
      - opened
      - synchronize

jobs:
  unit-test:
    runs-on: ubuntu-22.04
    steps:
    - name: Setup Go
      uses: actions/setup-go@v2
      with:
        go-version: 1.21.x

    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.head.sha }}

    - name: Install tools
      run: make tools

    - name: Install Docker
      uses: docker/setup-docker-action@v4

    - name: Define owner
      if: contains(github.event.pull_request.labels.*.name, 'NeedSDK')
      run: |
        echo "FORK_OWNER=${{ github.event.pull_request.head.repo.owner.login }}" >> $GITHUB_ENV

    - name: Define aws-sdk-go's branch
      if: contains(github.event.pull_request.labels.*.name, 'NeedSDK')
      run: |
        SDK_BRANCH=$(echo "${{ github.event.pull_request.body }}" | grep -oE 'aws-sdk-go=[^\s]+' || true)
        if [[ -n "$SDK_BRANCH" ]]; then
          BRANCH=$(echo "$SDK_BRANCH" | cut -d '=' -f2 | tr -d '\r')
        else
          BRANCH="${{ github.event.pull_request.head.ref }}"
        fi
        echo "AWS_SDK_GO_BRANCH=$BRANCH" >> $GITHUB_ENV

    - name: Define last commit of the fork
      if: contains(github.event.pull_request.labels.*.name, 'NeedSDK')
      run: |
        echo "FORK_COMMIT=$(git ls-remote https://github.com/${{ env.FORK_OWNER }}/aws-sdk-go.git ${{ env.AWS_SDK_GO_BRANCH }} |\
        cut -c1-7)">> $GITHUB_ENV

    - name: Bump version in go.mod
      if: contains(github.event.pull_request.labels.*.name, 'NeedSDK')
      run: |
        go mod edit -replace github.com/aws/aws-sdk-go=github.com/${{ env.FORK_OWNER }}/aws-sdk-go@${{ env.FORK_COMMIT }}

    - name: Apply dependencies
      run: go mod tidy

    - name: Run unit tests for the code
      run: make test
